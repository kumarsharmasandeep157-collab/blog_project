{% extends 'blog/base.html' %}
{% block title %}Register - DevBlog{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm border-0 bg-white">
    <h2 class="mb-4">Create an Account</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
    </form>
    <p class="mt-3 text-muted small">Already have an account? <a href="/admin/login/">Login here</a></p>
</div>
{% endblock %}
